<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Presupuesto</title>

    <link rel="stylesheet" href="./styles.css">
</head>

<body class="body">

    <header class="header">

        <div class="header__container">

            <h1 class="header__logo">
                MoneyFlow
            </h1>

            <p class="header__paragraph">
                Organiza tus gastos mensuales.
            </p>

            <nav class="nav">

                <ul class="nav__list">

                    <li class="nav__item">
                        <a href="index.html" class="nav__link">
                            Inicio
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="presupuesto.html" class="nav__link">
                            Presupuesto
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="quieroSalir.html" class="nav__link">
                            Quiero Salir
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="ahorro.html" class="nav__link">
                            Ahorro
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <main class="main">

        <section class="budget">

            <h1 class="section__title">
                GASTOS
            </h1>

            <form class="form">

                <input
                    type="text"
                    placeholder="Alimentación y transporte"
                    class="form__input"
                >

                <input
                    type="text"
                    placeholder="Vivienda"
                    class="form__input"
                >

                <input
                    type="text"
                    placeholder="Ahorro"
                    class="form__input"
                >

                <input
                    type="text"
                    placeholder="Subscripciones y servicios"
                    class="form__input"
                >

                <input
                    type="text"
                    placeholder="Fondo de Emergencia"
                    class="form__input"
                >

                <button class="form__button">
                    Guardar Presupuesto
                </button>

            </form>

        </section>

    </main>

</body>
</html>
