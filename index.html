<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyFlow</title>

    <link rel="stylesheet" href="./styles.css">
</head>

<body class="body">

    <header class="header">

        <div class="header__container">

            <h1 class="header__logo">
                esPera
            </h1>

            <p class="header__paragraph">
                Controla tus gastos y mejora tus finanzas.
            </p>

            <nav class="nav">

                <ul class="nav__list">

                    <li class="nav__item">
                        <a href="index.html" class="nav__link">
                            Inicio
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="presupuesto.html" class="nav__link">
                            Presupuesto
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="quieroSalir.html" class="nav__link">
                            Quiero Salir
                        </a>
                    </li>

                    <li class="nav__item">
                        <a href="ahorro.html" class="nav__link">
                            Ahorro
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <section class="mood">

        <h2 class="mood__title">
            ¿Cómo te sientes hoy?
        </h2>

        <div class="mood__container">

            <button class="mood__button">
                😀 Feliz
            </button>

            <button class="mood__button">
                😌 Tranquilo
            </button>

            <button class="mood__button">
                😐 Neutral
            </button>

            <button class="mood__button">
                😟 Preocupado
            </button>

            <button class="mood__button">
                😢 Triste
            </button>

        </div>

    </section>

    <main class="main">

        <section class="main__income">

            <h1 class="section__title">
                GASTOS
            </h1>

            <div class="main__titles">

                <h1 class="income__quetzales">
                    Q 0.00
                </h1>

                <h2 class="income__letters">
                    Cero Quetzales
                </h2>

            </div>

        </section>

        <article class="income__feedback">

            <div class="income__paragraph">

                <p class="income__outcome">
                    Aquí aparecerá el análisis de tus gastos.
                </p>

            </div>

        </article>

    </main>

</body>
</html>
